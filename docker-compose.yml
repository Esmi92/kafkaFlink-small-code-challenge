services:
  jobmanager:
    image: flink:1.18.1-scala_2.12
    container_name: jobmanager
    command: jobmanager
    ports:
      - "8081:8081" 
    environment:
      - |
          FLINK_PROPERTIES=
          jobmanager.rpc.address: jobmanager
  taskmanager:
    image: flink:1.18.1-scala_2.12
    container_name: taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - |
          FLINK_PROPERTIES=
          jobmanager.rpc.address: jobmanager
          taskmanager.numberOfTaskSlots: 2
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: "1"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      CLUSTER_ID: "esme-cluste-id"
  job:
    build: ./flink-job
    image: demo-flink-job:latest
    container_name: job
    depends_on:
      - jobmanager
      - stream-app
    command: >
      flink run -m jobmanager:8081 -c com.demoproject.flinkjob.FlinkJob /opt/flink/usrlib/flink-job-1.0-SNAPSHOT.jar
    environment:
      - |
          FLINK_PROPERTIES=
          jobmanager.rpc.address: jobmanager
  stream-app:
    build: ./stream-app
    image: demo-stream-app:latest
    container_name: stream-app
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
  mongo:
    image: mongo:8.0
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
